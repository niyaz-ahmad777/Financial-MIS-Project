<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial MIS - Reports</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <button class="back-btn" type="button" data-back-href="dashboard.html"><i class="bi bi-arrow-left"></i> Back</button>
      <h1>Reports</h1>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="transactions.html">Transactions</a>
      <a href="alerts.html">Alerts</a>
      <a href="profile.html">Profile</a>
      <button id="darkModeToggle" type="button" class="icon-btn" title="Toggle dark mode">D</button>
      <button id="notifyBtn" type="button" class="icon-btn" title="Show notification">N</button>
    </nav>
  </header>
  <main class="page">
    <section class="card">
      <h2>Export Reports</h2>
      <div class="filters-row">
        <select id="reportPeriod">
          <option value="daily">Daily</option>
          <option value="monthly" selected>Monthly</option>
        </select>
        <select id="reportFormat">
          <option value="csv" selected>CSV</option>
          <option value="pdf">PDF</option>
        </select>
      </div>
      <button id="generateReport">Generate Report</button>
      <p id="reportStatus"></p>
      <p id="reportRoleNote" class="auth-hint">Only admin users can generate reports.</p>
    </section>
  </main>

  <div id="appToast" class="app-toast" role="status" aria-live="polite">Security alert feed refreshed.</div>

  <script src="js/script.js"></script>
</body>
</html>
