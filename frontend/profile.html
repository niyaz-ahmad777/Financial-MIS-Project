<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial MIS - Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <button class="back-btn" type="button" data-back-href="dashboard.html"><i class="bi bi-arrow-left"></i> Back</button>
      <h1>Admin Profile</h1>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="transactions.html">Transactions</a>
      <a href="alerts.html">Alerts</a>
      <a href="reports.html">Reports</a>
      <button id="darkModeToggle" type="button" class="icon-btn" title="Toggle dark mode"><i class="bi bi-moon-stars-fill"></i></button>
      <button id="notifyBtn" type="button" class="icon-btn" title="Show notification"><i class="bi bi-megaphone-fill"></i></button>
      <a id="logoutAction" href="index.html">Logout</a>
    </nav>
  </header>

  <main class="page">
    <section class="card profile-card">
      <h2>Profile Details</h2>
      <div class="profile-grid">
        <div>
          <p class="label">Username</p>
          <p id="profileUsername" class="value">-</p>
        </div>
        <div>
          <p class="label">Role</p>
          <p id="profileRole" class="value">Admin</p>
        </div>
        <div>
          <p class="label">Email</p>
          <p id="profileEmail" class="value">-</p>
        </div>
      </div>
      <button id="profileLogout" type="button" class="danger-btn">Logout</button>
    </section>
  </main>

  <div id="appToast" class="app-toast" role="status" aria-live="polite">Profile loaded.</div>

  <script src="js/script.js"></script>
</body>
</html>
